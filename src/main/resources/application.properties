spring.application.name=irishpubfinder-api
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=${POSTGRES_URL:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USERNAME:}
spring.datasource.password=${POSTGRES_PASSWORD:}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Actuator — expose only the health endpoint publicly
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=604800000

# Comma-separated emails auto-promoted to ADMIN on login (bootstrap for the first admin).
# Once an admin exists, further role changes are made in-app via the user-management screen.
app.admin-emails=${DEFAULT_ADMIN_EMAILS:}

google.places.api.key=${GOOGLE_MAPS_API_KEY:}

r2.account.id=${R2_ACCOUNT_ID:}
r2.access.key.id=${R2_ACCESS_KEY_ID:}
r2.secret.access.key=${R2_SECRET_ACCESS_KEY:}
r2.bucket.name=${R2_BUCKET_NAME:}
r2.public.url=${R2_PUBLIC_URL:}

revenuecat.secret-key=${REVENUECAT_SECRET_KEY:}

# Comma-separated CORS origins allowed for browser clients (leave empty for mobile-only).
# Example: app.cors.allowed-origins=https://admin.irishpubfinder.com
app.cors.allowed-origins=